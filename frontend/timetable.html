<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchQueue — Timetable</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .tt-grid {
            display: grid;
            grid-template-columns: 100px repeat(6, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .tt-header { background: rgba(0,0,0,0.4); padding: 1rem; font-weight: 600; text-align: center; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.85rem; }
        .tt-time { background: rgba(255,255,255,0.02); padding: 1rem; font-size: 0.85rem; color: var(--text-muted); display:flex; align-items:center; justify-content:center; }
        .tt-cell { background: var(--bg); padding: 0.5rem; position: relative; min-height: 80px; transition: background 0.2s; }
        .tt-cell:hover { background: rgba(255,255,255,0.02); }
        .tt-slot {
            background: rgba(139, 92, 246, 0.15);
            border-left: 3px solid #8B5CF6;
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 0.25rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .tt-slot:hover { transform: translateY(-2px); background: rgba(139, 92, 246, 0.25); }
        .tt-subject { font-weight: 600; margin-bottom: 0.25rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .tt-room { color: var(--text-muted); font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="page-container">
        <aside id="nav-sidebar" class="nav-sidebar"></aside>
        
        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-title">Timetable</h1>
                    <p style="color: var(--text-muted); margin-top: 0.5rem;">Manage your weekly schedule</p>
                </div>
                <button id="btn-clear" class="btn btn-danger">Clear All</button>
            </header>
            
            <div class="grid grid-2" style="margin-bottom: 2rem;">
                <!-- Upload Zone -->
                <div class="card">
                    <h3 style="margin-bottom: 1rem;">Upload Timetable</h3>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">Upload an image of your timetable and AI will automatically extract the classes.</p>
                    
                    <div id="upload-zone" class="upload-zone">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">📸</div>
                        <h4>Drag & Drop image here</h4>
                        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.5rem;">or click to select file</p>
                        <input type="file" id="file-input" accept="image/*" style="display: none;">
                    </div>
                    
                    <div id="upload-progress" style="display:none; text-align:center; margin-top:1rem;">
                        <div class="spinner" style="margin: 0 auto 1rem;"></div>
                        <p>AI is analyzing your timetable...</p>
                    </div>
                </div>
                
                <!-- Today's Classes -->
                <div class="card">
                    <h3 style="margin-bottom: 1rem;">Today's Classes</h3>
                    <div id="today-classes" style="display:flex; flex-direction:column; gap:0.5rem;">
                        <div class="spinner" style="margin: 2rem auto;"></div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Weekly View</h3>
                <div id="weekly-grid" class="tt-grid">
                    <!-- Grid generated via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="card modal">
            <div class="modal-header">
                <h3>Edit Class</h3>
                <span class="close-modal" id="close-modal">&times;</span>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="edit-subject" class="input" required>
                </div>
                <div class="grid grid-2">
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="edit-start" class="input" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="edit-end" class="input" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Room (optional)</label>
                    <input type="text" id="edit-room" class="input">
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:1.5rem;">
                    <button type="button" class="btn btn-danger" id="btn-delete">Delete Class</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.requireAuth()) return;
            renderNav('timetable');
            
            const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
            let timetableData = [];
            
            // Upload logic
            const zone = document.getElementById('upload-zone');
            const fileInput = document.getElementById('file-input');
            const progress = document.getElementById('upload-progress');
            
            zone.addEventListener('click', () => fileInput.click());
            
            ['dragover', 'dragenter'].forEach(e => zone.addEventListener(e, (ev) => {
                ev.preventDefault();
                zone.classList.add('dragover');
            }));
            
            ['dragleave', 'dragend', 'drop'].forEach(e => zone.addEventListener(e, (ev) => {
                ev.preventDefault();
                zone.classList.remove('dragover');
            }));
            
            zone.addEventListener('drop', (e) => {
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) handleUpload(file);
            });
            
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) handleUpload(file);
            });
            
            async function handleUpload(file) {
                zone.style.display = 'none';
                progress.style.display = 'block';
                
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    await api('/timetable/upload', {
                        method: 'POST',
                        body: formData
                    });
                    showToast('Timetable extracted successfully!');
                    loadData();
                } catch (err) {
                    showToast(err.message, 'error');
                } finally {
                    zone.style.display = 'block';
                    progress.style.display = 'none';
                    fileInput.value = '';
                }
            }
            
            // Load Data
            async function loadData() {
                try {
                    const [allData, todayData] = await Promise.all([
                        api('/timetable'),
                        api('/timetable/today')
                    ]);
                    timetableData = allData;
                    renderWeekly(allData);
                    renderToday(todayData);
                } catch (err) {
                    showToast('Failed to load timetable', 'error');
                }
            }
            
            function renderToday(data) {
                const container = document.getElementById('today-classes');
                if (data.length === 0) {
                    container.innerHTML = `<div class="empty-state" style="padding:1rem;"><p>No classes today! 🎉</p></div>`;
                    return;
                }
                
                container.innerHTML = data.map(c => `
                    <div style="background:var(--surface); border:1px solid var(--border); padding:1rem; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-weight:600; margin-bottom:0.25rem">${c.subject}</div>
                            <div style="font-size:0.8rem; color:var(--text-muted)">${c.room ? `📍 ${c.room}` : ''}</div>
                        </div>
                        <div style="background:rgba(139, 92, 246, 0.1); padding:0.4rem 0.8rem; border-radius:4px; font-size:0.85rem; color:#8B5CF6;">
                            ${c.start_time.substring(0,5)} - ${c.end_time.substring(0,5)}
                        </div>
                    </div>
                `).join('');
            }
            
            function renderWeekly(data) {
                const grid = document.getElementById('weekly-grid');
                
                // Get unique times for rows (e.g. 09:00, 10:00)
                let times = Array.from(new Set(data.map(d => d.start_time.substring(0,5))));
                if (times.length === 0) times = ['09:00', '10:00', '11:00', '12:00', '13:00', '14:00'];
                times.sort();
                
                let html = '<div class="tt-header">Time</div>';
                days.forEach(d => html += `<div class="tt-header">${d.substring(0,3)}</div>`);
                
                times.forEach(time => {
                    html += `<div class="tt-time">${time}</div>`;
                    days.forEach(day => {
                        html += `<div class="tt-cell">`;
                        const classes = data.filter(d => d.day_of_week === day && d.start_time.startsWith(time));
                        classes.forEach(c => {
                            html += `
                                <div class="tt-slot" data-id="${c.id}">
                                    <div class="tt-subject">${c.subject}</div>
                                    <div style="font-size:0.7rem; margin-bottom:0.1rem">${c.start_time.substring(0,5)} - ${c.end_time.substring(0,5)}</div>
                                    ${c.room ? `<div class="tt-room">${c.room}</div>` : ''}
                                </div>
                            `;
                        });
                        html += `</div>`;
                    });
                });
                
                grid.innerHTML = html;
                
                // Add click listeners
                grid.querySelectorAll('.tt-slot').forEach(slot => {
                    slot.addEventListener('click', () => openModal(slot.dataset.id));
                });
            }
            
            // Modal Logic
            const modal = document.getElementById('edit-modal');
            const form = document.getElementById('edit-form');
            
            function openModal(id) {
                const item = timetableData.find(d => d.id === id);
                if(!item) return;
                
                document.getElementById('edit-id').value = item.id;
                document.getElementById('edit-subject').value = item.subject;
                document.getElementById('edit-start').value = item.start_time;
                document.getElementById('edit-end').value = item.end_time;
                document.getElementById('edit-room').value = item.room || '';
                
                modal.classList.add('active');
            }
            
            document.getElementById('close-modal').addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('active') });
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('edit-id').value;
                const body = {
                    subject: document.getElementById('edit-subject').value,
                    start_time: document.getElementById('edit-start').value,
                    end_time: document.getElementById('edit-end').value,
                    room: document.getElementById('edit-room').value || null
                };
                
                try {
                    await api(`/timetable/${id}`, { method: 'PUT', body: JSON.stringify(body) });
                    modal.classList.remove('active');
                    showToast('Class updated');
                    loadData();
                } catch (err) {
                    showToast(err.message, 'error');
                }
            });
            
            document.getElementById('btn-delete').addEventListener('click', async () => {
                if(!confirm('Delete this class?')) return;
                const id = document.getElementById('edit-id').value;
                try {
                    await api(`/timetable/${id}`, { method: 'DELETE' });
                    modal.classList.remove('active');
                    showToast('Class deleted');
                    loadData();
                } catch (err) {
                    showToast(err.message, 'error');
                }
            });
            
            document.getElementById('btn-clear').addEventListener('click', async () => {
                if(!confirm('Clear entire timetable? This cannot be undone.')) return;
                try {
                    await api('/timetable', { method: 'DELETE' });
                    showToast('Timetable cleared');
                    loadData();
                } catch(e) {
                    showToast(e.message, 'error');
                }
            });
            
            loadData();
        });
    </script>
</body>
</html>
