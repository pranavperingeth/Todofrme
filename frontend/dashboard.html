<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchQueue — Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="page-container">
        <aside id="nav-sidebar" class="nav-sidebar"></aside>
        
        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-title">Dashboard</h1>
                    <p style="color: var(--text-muted); margin-top: 0.5rem;" id="welcome-text">Welcome back</p>
                </div>
                <div class="header-actions">
                    <input type="text" id="search-input" class="input" placeholder="Search items..." style="width: 250px;">
                </div>
            </header>
            
            <div class="quick-add">
                <div style="flex:1; display:flex; gap:1rem;">
                    <input type="url" id="add-url" class="input" placeholder="Paste a link here (YouTube, Netflix, etc.)" required>
                    <div style="width: 200px;">
                        <label style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Priority: <span id="add-priority-val">5</span>/10</label>
                        <input type="range" id="add-priority" min="1" max="10" value="5">
                    </div>
                </div>
                <button id="btn-analyze" class="btn btn-secondary">Analyze</button>
                <button id="btn-add" class="btn btn-primary" style="display: none;">Add to Queue</button>
            </div>
            
            <div id="preview-card" class="card" style="display: none; margin-bottom: 2rem; border-color: #8B5CF6;">
                <!-- Preview content injected here -->
            </div>
            
            <div class="grid grid-4" style="margin-bottom: 2.5rem;" id="stats-container">
                <!-- Stats injected here -->
            </div>
            
            <div class="tabs" id="category-tabs">
                <button class="tab active" data-cat="">All</button>
                <button class="tab" data-cat="movie">Movies</button>
                <button class="tab" data-cat="education">Education</button>
                <button class="tab" data-cat="entertainment">Entertainment</button>
                <button class="tab" data-cat="book">Books</button>
            </div>
            
            <div id="media-grid" class="grid grid-3">
                <!-- Media cards injected here -->
            </div>
            
        </main>
    </div>

    <script src="/static/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.requireAuth()) return;
            
            renderNav('dashboard');
            document.getElementById('welcome-text').textContent = `Welcome back, ${Auth.getUser().username}`;
            
            let currentCategory = '';
            let searchQuery = '';
            let analysisResult = null;
            
            // Stats
            async function loadStats() {
                try {
                    const stats = await api('/media/stats');
                    const c = document.getElementById('stats-container');
                    
                    const comp = stats.by_status['completed'] || 0;
                    
                    c.innerHTML = `
                        <div class="card stat-card">
                            <div class="stat-label">Total Items</div>
                            <div class="stat-num">${stats.total}</div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-label">Watching / Reading</div>
                            <div class="stat-num">${stats.by_status['watching'] || 0}</div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-label">Completed</div>
                            <div class="stat-num">${comp}</div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-label">Education</div>
                            <div class="stat-num">${stats.by_category['education'] || 0}</div>
                        </div>
                    `;
                } catch (e) {
                    console.error('Failed to load stats', e);
                }
            }
            
            // Media Grid
            async function loadMedia() {
                try {
                    const grid = document.getElementById('media-grid');
                    grid.innerHTML = '<div class="spinner" style="margin: 2rem auto;"></div>';
                    
                    let url = '/media?sort_by=priority_score&limit=50';
                    if (currentCategory) url += `&category=${currentCategory}`;
                    if (searchQuery) url += `&search=${encodeURIComponent(searchQuery)}`;
                    
                    const items = await api(url);
                    
                    if (items.length === 0) {
                        grid.innerHTML = `
                            <div class="empty-state" style="grid-column: 1 / -1;">
                                <div class="empty-icon">📂</div>
                                <h3>No items found</h3>
                                <p>Try adding a new link above or changing filters.</p>
                            </div>
                        `;
                        return;
                    }
                    
                    grid.innerHTML = items.map(item => `
                        <div class="card media-card">
                            <div style="position: relative;">
                                <img src="${item.thumbnail_url || 'https://via.placeholder.com/300x160?text=No+Thumbnail'}" class="media-card-img" alt="Thumbnail">
                                <div style="position: absolute; top: 0.5rem; right: 0.5rem; display: flex; gap: 0.25rem;">
                                    <span class="badge badge-${item.category}">${getCategoryIcon(item.category)} ${item.category}</span>
                                </div>
                                <div style="position: absolute; bottom: 0.5rem; left: 0.5rem;">
                                    <span class="priority-badge" style="background: ${getPriorityColor(item.priority_score)}; box-shadow: 0 0 10px ${getPriorityColor(item.priority_score)}">
                                        ${item.priority_score}
                                    </span>
                                </div>
                                ${item.duration ? `<div style="position: absolute; bottom: 0.5rem; right: 0.5rem; background: rgba(0,0,0,0.8); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem;">${formatDuration(item.duration)}</div>` : ''}
                            </div>
                            <div class="media-card-content">
                                <h3 class="media-card-title"><a href="${item.url}" target="_blank">${item.title || item.url}</a></h3>
                                <div style="font-size: 0.85rem; color: var(--text-muted);">
                                    ${getPlatformIcon(item.platform)} ${item.channel_name || item.platform}
                                </div>
                                <div class="media-card-meta">
                                    <select class="select status-select" style="width: 120px; padding: 0.25rem 0.5rem; font-size: 0.8rem; background: var(--glass);" data-id="${item.id}">
                                        <option value="unwatched" ${item.status === 'unwatched' ? 'selected' : ''}>Unwatched</option>
                                        <option value="watching" ${item.status === 'watching' ? 'selected' : ''}>Watching</option>
                                        <option value="completed" ${item.status === 'completed' ? 'selected' : ''}>Completed</option>
                                        <option value="dropped" ${item.status === 'dropped' ? 'selected' : ''}>Dropped</option>
                                    </select>
                                    <button class="btn-delete" style="color: #EF4444; background: none; border: none; cursor: pointer; padding: 0.25rem;" data-id="${item.id}">🗑️</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                    
                    // Add listeners
                    grid.querySelectorAll('.status-select').forEach(sel => {
                        sel.addEventListener('change', async (e) => {
                            const id = e.target.dataset.id;
                            const status = e.target.value;
                            try {
                                await api(`/media/${id}`, {
                                    method: 'PUT',
                                    body: JSON.stringify({ status })
                                });
                                showToast('Status updated');
                                loadStats();
                            } catch (err) {
                                showToast(err.message, 'error');
                            }
                        });
                    });
                    
                    grid.querySelectorAll('.btn-delete').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            if (!confirm('Delete this item?')) return;
                            const id = e.target.closest('button').dataset.id;
                            try {
                                await api(`/media/${id}`, { method: 'DELETE' });
                                showToast('Item deleted');
                                loadMedia();
                                loadStats();
                            } catch (err) {
                                showToast(err.message, 'error');
                            }
                        });
                    });
                    
                } catch (e) {
                    showToast('Failed to load media', 'error');
                }
            }
            
            // Quick Add
            const urlInput = document.getElementById('add-url');
            const prioInput = document.getElementById('add-priority');
            const prioVal = document.getElementById('add-priority-val');
            const btnAnalyze = document.getElementById('btn-analyze');
            const btnAdd = document.getElementById('btn-add');
            const previewCard = document.getElementById('preview-card');
            
            prioInput.addEventListener('input', (e) => {
                prioVal.textContent = e.target.value;
            });
            
            btnAnalyze.addEventListener('click', async () => {
                const url = urlInput.value.trim();
                if (!url) return showToast('Please enter a URL', 'error');
                
                const origText = btnAnalyze.textContent;
                btnAnalyze.textContent = 'Analyzing...';
                btnAnalyze.disabled = true;
                
                try {
                    analysisResult = await api(`/media/analyze?url=${encodeURIComponent(url)}`, { method: 'POST' });
                    
                    previewCard.style.display = 'block';
                    previewCard.innerHTML = `
                        <div style="display:flex; gap: 1.5rem; align-items: start;">
                            ${analysisResult.thumbnail ? `<img src="${analysisResult.thumbnail}" style="width: 200px; border-radius: 8px;">` : ''}
                            <div>
                                <h3 style="margin-bottom: 0.5rem;">${analysisResult.title || 'Unknown Title'}</h3>
                                <div style="display:flex; gap: 0.5rem; margin-bottom: 1rem;">
                                    <span class="badge badge-${analysisResult.category}">${analysisResult.category}</span>
                                    <span class="badge" style="background: var(--glass)">Conf: ${Math.round(analysisResult.confidence * 100)}%</span>
                                    ${analysisResult.education_topic ? `<span class="badge badge-education">Topic: ${analysisResult.education_topic}</span>` : ''}
                                </div>
                                <p style="font-size: 0.9rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">${analysisResult.description || 'No description available'}</p>
                            </div>
                        </div>
                    `;
                    
                    btnAnalyze.style.display = 'none';
                    btnAdd.style.display = 'inline-flex';
                } catch (err) {
                    showToast(err.message, 'error');
                } finally {
                    btnAnalyze.textContent = origText;
                    btnAnalyze.disabled = false;
                }
            });
            
            btnAdd.addEventListener('click', async () => {
                const url = urlInput.value.trim();
                const prio = parseInt(prioInput.value);
                
                const origText = btnAdd.textContent;
                btnAdd.textContent = 'Adding...';
                btnAdd.disabled = true;
                
                try {
                    await api('/media', {
                        method: 'POST',
                        body: JSON.stringify({ url, priority_score: prio })
                    });
                    
                    showToast('Added to queue!');
                    urlInput.value = '';
                    prioInput.value = 5;
                    prioVal.textContent = '5';
                    previewCard.style.display = 'none';
                    btnAdd.style.display = 'none';
                    btnAnalyze.style.display = 'inline-flex';
                    analysisResult = null;
                    
                    loadMedia();
                    loadStats();
                } catch (err) {
                    showToast(err.message, 'error');
                } finally {
                    btnAdd.textContent = origText;
                    btnAdd.disabled = false;
                }
            });
            
            // Reset preview on input change
            urlInput.addEventListener('input', () => {
                previewCard.style.display = 'none';
                btnAdd.style.display = 'none';
                btnAnalyze.style.display = 'inline-flex';
                analysisResult = null;
            });
            
            // Tabs & Search
            document.getElementById('category-tabs').addEventListener('click', (e) => {
                if (e.target.classList.contains('tab')) {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategory = e.target.dataset.cat;
                    loadMedia();
                }
            });
            
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', debounce((e) => {
                searchQuery = e.target.value.trim();
                loadMedia();
            }, 500));
            
            // Initial load
            loadStats();
            loadMedia();
        });
    </script>
</body>
</html>
